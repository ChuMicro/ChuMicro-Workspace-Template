# Per-project config — deep-merged over workspace.yml's `defaults:` block
# at deploy time.  Values here win at any nesting depth.
#
# Workspace-wide credentials (wifi password, broker auth) live in
# the gitignored ``workspace.yml`` under ``defaults.<section>.<key>``.
# Per-project knobs that vary across boards (sensor pins, sample
# periods, mqtt topics) belong here.  This file is gitignored when
# scaffolded by ``python run.py new``.

