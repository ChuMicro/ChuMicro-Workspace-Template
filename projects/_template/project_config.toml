# Per-project config — deep-merged over the workspace's gitignored
# ``secrets.toml`` at deploy time.  Values here win at any nesting depth.
#
# Workspace-wide credentials (wifi password, broker auth) live in
# the gitignored ``secrets.toml`` at the workspace root.  Per-project
# knobs that vary across boards (sensor pins, sample periods, mqtt
# topics) belong here.  This file is versioned with your project, so
# keep credentials out of it and in ``secrets.toml``.

# [wifi]
# ssid = "MyNetwork"
