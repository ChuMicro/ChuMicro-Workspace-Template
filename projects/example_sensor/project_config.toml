# Per-project config for example_sensor — deep-merged over the
# workspace's gitignored ``secrets.toml`` at deploy time.  Values
# here win at any nesting depth.
#
# Workspace-wide credentials (wifi password, broker auth) live in the
# gitignored ``secrets.toml`` at the workspace root.  Per-project
# knobs (broker host, mqtt topic, publish period) belong here.

[wifi]
# ssid normally comes from the workspace's secrets.toml.  Uncomment to
# pin this project to a specific network (values here override secrets.toml).
# ssid = "MyNetwork"
# hostname = "chu-sensor"             # optional: name the board on the AP
# connect_timeout_ms = 15000          # optional: cap per single connect attempt

[mqtt]
client_id = "chumicro-example_sensor"
# keep_alive_seconds = 60             # broker idle timeout (PINGREQ runs at half)
# For TLS, pass ssl_context= to MQTTClient.from_config in app.py and
# point the broker at port 8883.

[mqtt.broker]
host = "broker.hivemq.com"            # public test broker; swap for your own
port = 1883

[sensor]
topic = "chumicro/example/temperature"
publish_period_ms = 5000              # one heartbeat every 5 s
