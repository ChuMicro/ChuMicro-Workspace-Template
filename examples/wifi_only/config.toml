# Per-thing config — deep-merged over workspace.yml's `defaults:`
# block at deploy time.  Values here win at any nesting depth.
# Reference credentials from secrets.yml as `password = "!secret <name>"`;
# those get resolved during the merge so the on-device runtime never
# sees the literal "!secret ..." token.

[wifi]
# Set the SSID either here or in workspace.yml's [defaults.wifi]
# block (workspace.yml is the right home if every thing in this
# workspace uses the same network).
# ssid = "MyNetwork"
password = "!secret wifi_password"

[status]
# How often the heartbeat beacon prints state.  Override per
# thing without touching the wifi section.
period_ms = 5000
