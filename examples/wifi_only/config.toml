# Per-project config — deep-merged over workspace.yml's `defaults:`
# block at deploy time.  Values here win at any nesting depth.
#
# Keep credentials out of git: set ``defaults.wifi.password`` in the
# gitignored ``workspace.local.yml`` overlay rather than inlining the
# password here.  The deploy-time merge picks the overlay up
# automatically as one more layer (Decision 0057).

[wifi]
# Set the SSID either here or in workspace.yml's [defaults.wifi]
# block (workspace.yml is the right home if every project in this
# workspace uses the same network).
# ssid = "MyNetwork"

[status]
# How often the heartbeat beacon prints state.  Override per
# project without touching the wifi section.
period_ms = 5000
