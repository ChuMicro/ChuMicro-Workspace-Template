# Per-project config — deep-merged over the workspace's gitignored
# ``secrets.toml`` at deploy time.  Values here win at any nesting depth.
#
# Keep credentials out of git: set ``[wifi] password`` in the
# gitignored ``secrets.toml`` rather than inlining the password
# here.  The deploy-time merge picks the secrets up automatically
# as one more layer.

[wifi]
# Set the SSID either here or in the workspace's secrets.toml
# under ``[wifi] ssid``.  secrets.toml is the right home if every
# project in this workspace uses the same network.
# ssid = "MyNetwork"

[status]
# How often the heartbeat beacon prints state.  Override per
# project without touching the wifi section.
period_ms = 5000
