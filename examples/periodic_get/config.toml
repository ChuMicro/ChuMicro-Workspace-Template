# Per-project config — deep-merged over workspace.yml's `defaults:`
# block at deploy time.  Keep credentials out of git: set
# ``defaults.wifi.password`` in the gitignored ``workspace.yml``
# rather than inlining secrets here (Decision 0057).

[wifi]
# ssid = "MyNetwork"   # set here or in workspace.yml's [defaults.wifi]

[fetch]
# What to GET, and how often (milliseconds).  Pick a small JSON or
# a static landing page — the example prints status code + body
# size on each tick, so no JSON parsing is required.
url = "http://example.com/"
period_ms = 30000
