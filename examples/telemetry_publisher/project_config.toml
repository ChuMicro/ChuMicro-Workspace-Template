# Per-project config — deep-merged over the workspace's gitignored
# ``secrets.toml`` at deploy time.  Keep credentials out of git: set
# ``[wifi] password`` in the gitignored ``secrets.toml`` rather than
# inlining secrets here.

[wifi]
# ssid = "MyNetwork"  # set here or in the workspace's secrets.toml

[mqtt]
# Broker connection — `broker.hivemq.com` is a public test broker
# useful for first-deploy validation; swap for your own once round-
# trip is confirmed.
broker = "broker.hivemq.com"
port = 1883
tls = false

# Identity + topic.  The client_id must be unique per device on
# the broker; adding a board suffix to the workspace prefix is a
# safe convention.
client_id = "chumicro-telemetry-pub-1"
topic = "chumicro/example/telemetry"

# Publish cadence + keep-alive.  Both honour wraparound-safe
# millisecond ticks.
publish_period_ms = 5000
keep_alive_seconds = 60
