# Per-project config — deep-merged over workspace.yml's `defaults:`
# block at deploy time.

[wifi]
# ssid = "MyNetwork"  # set here or in workspace.yml's [defaults.wifi]
password = "!secret wifi_password"

[target]
# Where the sensor posts its readings.  Deploy the
# `two_projects/server` project first (`python run.py deploy
# garage/server --device board-a`), watch the deploy output for
# the listening IP, then paste the URL here before deploying
# this project.
url = "http://192.168.0.42:8080/api/sensor"

# Identifies this sensor in the server's status page + JSON view.
sensor_id = "sensor-1"

# How often to POST.  5s is plenty for a demo; bump up to keep
# the server's status page lively.
period_ms = 5000
