# deploy_targets:
#   # Single device — bare string or one-element list, both fine.
#   garage/door: pi-pico-w-circuitpython-board
#   # Multiple devices — each value can be a list; `deploy --all-projects`
#   # ships to every entry in declaration order.
#   garage/server:
#     - pi-pico-w-micropython-board
#     - lolin-s2-micropython-board

# quality:
#   lint:
#     # Disable to skip `python run.py lint` (CI keeps running its
#     # own ruff via pyproject.toml's [tool.ruff] config).
#     enabled: true
#     # Optional ruff rule codes — `--select` is forwarded to ruff
#     # before any user `--` passthrough so you can override per-call.
#     # Omit to defer entirely to pyproject.toml's [tool.ruff.lint].
#     # select: ["E", "F", "I"]
#   # Forwarded to pytest as --cov-fail-under.  Pyproject.toml's
#   # [tool.coverage.report] fail_under still applies; this lets
#   # workspace.yml override the per-package gate without editing
#   # pyproject.toml.  Omit for "no workspace-level gate".
#   # coverage_threshold: 85
