# workspace.yml — root configuration for this ChuMicro project.
#
# Five top-level blocks (all optional):
#
#   defaults:        Workspace-wide defaults that every project inherits.
#                    Per-project config under projects/<name>/config.toml
#                    deep-merges over this — values in the per-project
#                    file win at any nesting depth.
#
#   library_sources: Local paths or pinned overrides for shared libs.
#                    Empty by default — falls through to libs/ +
#                    packages/.  Use this to point a library at a
#                    local clone (development) or a non-default version.
#
#   deploy_targets:  Per-project → per-device default mapping.  When set,
#                    a bare `deploy <project>` (no --device) picks the
#                    project's mapped target; `deploy --all-projects`
#                    walks the whole mapping at once.  Empty by default
#                    — single-project deploys fall back to devices.yml's
#                    `defaults:` block.
#
#   quality:         Workspace-level lint / coverage / agent knobs.
#                    Consumed by `python run.py lint` and
#                    `python run.py test`.  Missing block → permissive
#                    defaults (lint enabled, no coverage gate, agent
#                    relaxed).
#
#   environments:    Reserved for the env / use commands (planned).

defaults:
  # Project-scoped wifi defaults.  Per-project config can override every
  # field; password should be kept in secrets.yml and referenced as
  # `password = "!secret <name>"` from each project's config.toml.
  wifi:
    hostname_prefix: chu-

# library_sources:
