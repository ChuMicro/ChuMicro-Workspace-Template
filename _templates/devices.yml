# devices.yml — board registry.  Three-zone shape:
#
#   USER-OWNED      Never overwritten without --force.  Edit freely.
#   HARDWARE-ONCE   Written on first probe; prompts before re-overwriting
#                   (the "did you swap boards?" guard).
#   PROBED-ALWAYS   Tool-owned and silently refreshed (e.g., address:).
#
# The `chumicro-workspace` CLI commands (`add-device`, `rename`,
# `probe`) edit this file via ruamel.yaml; user comments + key order
# survive every round-trip.

defaults:
  # Pin which device id each runtime defaults to when no --device-id
  # flag is passed.  Filled by `add-device` on first registration.
  micropython: null
  circuitpython: null
  # Deploy mode for all devices: "flash" (production-shaped, default) or
  # "ram" (no flash wear; only useful for unit-style tests).  Decision 0047 —
  # ram mode isn't a reflection of reality deployments, so flash is the
  # default for projects, examples, and most functional tests.  Override
  # per-device in the entries below, or per-deploy with `--deploy-mode ram`.
  deploy_mode: flash

devices: []
  # Example shape (uncomment + edit, or use `add-device`):
  #
  # - id: back-porch                                # USER-OWNED
  #   description: Pi Pico W on the back porch      # USER-OWNED
  #   runtime: micropython                          # USER-OWNED
  #   address: /dev/cu.usbmodem1101                 # PROBED-ALWAYS
  #   hardware:                                     # HARDWARE-ONCE
  #     uid: ABCD0123
  #     machine: Raspberry Pi Pico W with rp2040
  #     board_id: raspberry_pi_pico_w
