# secrets.yml — gitignored credential store referenced via `!secret <name>`.
#
# This file is materialized from `_templates/secrets.yml` by
# `python run.py setup`.  Edit it directly — re-runs of setup
# will not overwrite it.  Add credentials below as flat key/value
# pairs:
#
#     wifi_password: my-real-wifi-password
#     api_token: 1234abcd
#
# Reference them from any thing's config.toml as:
#
#     password = "!secret wifi_password"
#
# The deploy-time merge resolves !secret references against this
# file before packing the runtime config msgpack — secrets are
# resolved last, after workspace.yml defaults and the thing's own
# config.toml have been merged.

# wifi_password: replace-me
# api_token: replace-me
